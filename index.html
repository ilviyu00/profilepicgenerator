<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile Pic Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https.://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body {
            font-family: Poppins, sans-serif;

            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            background-attachment: fixed;

            padding-top: 80px;
            padding-bottom: 20px;

            transition: background 1s ease;
        }

        .gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transition: opacity 1.2s ease;
        }

        /* Default gradients */
        #gradientA {
            background: linear-gradient(135deg, #676eea, #764ba2);
            opacity: 1;
        }

        #gradientB {
            background: linear-gradient(135deg, #676eea, #764ba2);
            opacity: 0;
        }

        :root {
            --bg1: #676eea;
            --bg2: #764ba2;
        }

        /* Card */
        .container {
            max-width: 1100px;
            margin: 0 auto 160px auto;
            padding: 30px;
            border-radius: 20px;
            z-index: 1;

            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(15px);
            /*support for safari*/

            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);

            transition: background 0.8s ease, color 0.8s ease, box-shadow 0.8s ease;
        }

        input,
        select {
            transition: background 1s ease, color 1s ease, border 1s ease;
        }

        button,
        input,
        s select {
            transition: background 1s ease, color 1s ease, border 1s ease;
        }

        /* Inputs */
        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 8px;

            border-radius: 8px;
            border: 1px solid #ccc;
        }

        select,
        input {
            background-color: white;
            color: black;
            transition: background-color 0.8s ease, color 0.8s ease, border-color 0.8s ease;
        }

        .dark select,
        .dark input {
            background-color: #444;
            color: white;
            border: 1px solid #666;
        }

        /* Buttons */
        button {
            background: #676eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Images */
        #imageArea {
            margin-top: 20px;
            max-width: 400px;
            margin: 20px auto;
            width: 100%;
            text-align: center;
        }

        #imageArea img {
            width: 100%;
            border-radius: 12px;
            display: block;
            margin: auto;
            opacity: 0;
            animation: fadeIn .7s forwards;
        }

        #imageStatus {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            width: 100%;
            display: block;
            transition: color 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Spinner */
        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #555;

            width: 60px;
            height: 60px;

            border-radius: 50%;

            animation: spin 1s linear infinite;

            margin: auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Dark Mode */
        .dark {
            background: #121212 !important;
            color: white;
            font-family: Poppins, sans-serif;
        }

        .dark .container {
            background: #1f1f1f;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        label,
        h1,
        p #creditText {
            transition: color 0.8s ease;
        }

        .dark input,
        .dark select {
            background: #444;
            color: white;
            border: 1px solid #666;
        }

        #payBtn {
            margin-top: 12px;
            padding: 10px 18px;
            font-size: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: black;
            font-weight: 400;
            font-family: Poppins, sans-serif;
            display: inline-block;
            text-align: center;
            transition: transform 0.6s ease;
        }

        #payBtn:hover {
            transform: scale(1.05);
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: 400;
        }

        input,
        select {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        #profilePreview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            margin: 20px auto;
            cursor: grab;
        }

        #profilePreview.show {
            display: block;
            justify-content: center;
            align-items: center;
            animation: fadeIn .6s ease;
            margin: 30px
        }

        #previewImage {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
        }

        #profilePreview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        #editorControls {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #editorToolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
        }

        #adjustBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        #zoomControls {
            display: flex;
            gap: 12px;
        }

        #zoomControls button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
        }

        #downloadBtn {
            background-color: #676eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.8s ease, color 0.8s ease;
            margin-top: 5px;
        }

        .dark #downloadBtn {
            background-color: #676eea;
            color: white;
            /* dark mode text */
        }

        #resizeHandle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 3px solid #676eea;
            cursor: nwse-resize;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease;
        }

        #resizeHandle:hover {
            transform: scale(1.15);
        }

        #profileSection {
            margin-top: 20px;
        }

        .topBar {
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
            margin-bottom: 25px;
        }

        #darkToggle {
            position: absolute;
            right: 20px;
            top: 20px;
            transform: translateY(-50%);

            padding: 10px 18px;
            border-radius: 10px;
            border: none;

            background: #676eea;
            color: white;
            cursor: pointer;
        }

        .topBar button {
            position: absolute;
            right: 0;
        }

        .mainGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;

            gap: 40px;
        }

        .leftPanel,
        .rightPanel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (max-width: 800px) {
            .mainGrid {
                grid-template-columns: 1fr;
            }

            .topBar button {
                position: static;
                margin-top: 10px;
            }
        }

        .scanning::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px white;
            animation: scan 1.5s infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            50% {
                top: 100%
            }

            100% {
                top: 0;
            }
        }

        #historyGallery img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        #historyGallery img:hover {
            transform: scale(1.1);
            border-color: #676eea;
        }

        #historySection {
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button:disabled {
            cursor: not-allowed;
            filter: grayscale(1);
            opacity: 0.7;
            transition: all 0.5s ease;
        }

        .filter-group {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: #676eea;
        }

        .slider-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .slider-row label {
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #ccc;
        }

        .slider-row input[type="range"] {
            width: 85%;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <div id="gradientA" class="gradient-layer"></div>
    <div id="gradientB" class="gradient-layer"></div>
    <div class="container">

        <div class="topBar">
            <h1>Profile Picture Generator</h1>
            <button id="darkToggle">Dark Mode</button>
        </div>

        <div class="mainGrid">

            <!-- LEFT PANEL -->
            <div class="leftPanel">
                <label>Choose Theme</label>
                <select id="theme">
                    <option value="">Select a theme</option>
                    <option value="meowl">Meowl</option>
                    <option value="trash">Trash</option>
                    <option value="fish">Fish</option>
                </select>

                <label>Prompt</label>
                <input id="prompt" maxlength="100" placeholder="Describe your pfp...">
                <button id="shuffleBtn" style="background: #676eea; font-size: 12px; padding: 5px 10px;">Random Shuffle
                    Idea</button>
                <div id="charCounter" style="font-size: 12px; opacity: 0.6; margin-top: 5px;">0 / 100</div>
                <label>API Key</label>
                <input id="apikey" placeholder="Enter API key...">

                <button id="generateBtn">Generate</button>

                <div id="creditSection">
                    <p id="creditText"></p>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="rightPanel">

                <div id="imageStatus"></div>
                <div id="imageArea"></div>

                <div id="profileSection" style="display:none;">

                    <div id="profilePreview">
                        <img id="previewImage" src="https://api.dicebear.com/7.x/bottts/svg?seed=Welcome"
                            style="opacity: 0.5; width: 100%; height: 100%; object-fit: cover;">
                    </div>

                    <div id="editorControls">
                        <div id="editorToolbar">
                            <button id="zoomOut">−</button>
                            <button id="zoomIn">+</button>
                            <button id="downloadBtn">Download</button>
                            <button id="copyBtn">Copy Image</button>
                            <button id="enhanceBtn" style="background: #676eea; font-size: 12px; padding: 5px 10px;">✨
                                Enhance</button>
                        </div>
                        <div class="filter-group">
                            <div class="slider-row">
                                <label>BRIGHTNESS</label>
                                <input type="range" id="bright" min="50" max="150" value="100">
                            </div>
                            <div class="slider-row">
                                <label>CONTRAST</label>
                                <input type="range" id="contrast" min="50" max="150" value="100">
                            </div>
                            <div class="slider-row">
                                <label>SEPIA</label>
                                <input type="range" id="sepia" min="0" max="100" value="0">
                            </div>
                        </div>>

                        <div id="resizeHandle"></div>
                    </div>

                </div>
                <div id="historySection" style="margin-top:30px; display:none;">
                    <h3 style="text-align:center;">Your History</h3>
                    <div id="historyGallery" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
                    </div>
                </div>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
